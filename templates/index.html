<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dropship AI Landing</title>
    <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
    <div class="container">

        <header>
            <div>
                <div class="wordmark">DROP<span>SHIP</span></div>
                <div class="sub">Interactive Landing Telemetry</div>
            </div>
            <div class="badge">
                <span class="dot live" id="statusDot"></span>
                <span id="statusText">STANDBY</span>
            </div>
        </header>

        <main class="main-layout">
            
            <section class="video-wrap">
                <img id="video-screen" src="/video_feed" alt="Simulation feed">
            </section>

            <section class="controls">
                <div class="controls-stack">

                    <div class="control-group">
                        <label style="margin-bottom: 0;">
                            Altitude (Locked)
                            <span><span class="val">500</span><span class="unit">m</span></span>
                        </label>
                    </div>

                    <div class="control-group">
                        <label>
                            Drop Speed
                            <span><span class="val" id="valSpeed">50</span><span class="unit">m/s</span></span>
                        </label>
                        <div class="slider-wrap">
                            <input type="range" class="filled" id="sliderSpeed"
                                   min="0" max="100" step="25" value="50"
                                   oninput="syncSlider(this, 'valSpeed')">
                            <div class="ticks"><span class="tick">0</span><span class="tick">50</span><span class="tick">100</span></div>
                        </div>
                    </div>

                    <div class="control-group">
                        <label>
                            Spawn Offset
                            <span><span class="val" id="valXPos">0</span><span class="unit">m</span></span>
                        </label>
                        <div class="slider-wrap">
                            <input type="range" class="filled" id="sliderXPos"
                                   min="-30" max="30" step="15" value="0"
                                   oninput="syncSlider(this, 'valXPos')">
                            <div class="ticks"><span class="tick">−30</span><span class="tick">0</span><span class="tick">+30</span></div>
                        </div>
                    </div>

                    <div class="control-group">
                        <label>
                            Spawn Angle
                            <span><span class="val" id="valAngle">0</span><span class="unit">deg</span></span>
                        </label>
                        <div class="slider-wrap">
                            <input type="range" class="filled" id="sliderAngle"
                                   min="-180" max="180" step="45" value="0"
                                   oninput="syncSlider(this, 'valAngle')">
                            <div class="ticks"><span class="tick">-180</span><span class="tick">0</span><span class="tick">+180</span></div>
                        </div>
                    </div>

                </div>

                <button class="launch-btn" id="launchBtn">INITIATE DROP</button>
            </section>
        </main>
    </div>

    <script src="{{ url_for('static', filename='js/script.js') }}"></script>
</body>
</html>
